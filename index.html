<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Inicio de la Aventura</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at center, #0f172a, #020617);
    color: #e5e7eb;
    overflow-x: hidden;
    overflow-y: auto;
}

/* CONTENEDOR APP */
.container {
    position: relative;
    z-index: 1;
    width: 100%;
    min-height: 100dvh;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    padding: 20px;
    box-sizing: border-box;

    animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
}

/* PARTICULAS */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* TARJETA */
.card {
    width: 100%;
    max-width: 380px;

    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    gap: 6px;

    padding: 16px;
    border-radius: 16px;

    background: rgba(255,255,255,0.03);
}

/* FINAL */
.card.success {
    transform: scale(1.05);
    box-shadow: 0 0 30px rgba(255,215,0,0.5);
    transition: all 0.4s ease;
}

/* TEXTOS */
h1 {
    font-family: 'Cinzel', serif;
    font-size: 3vh;
    text-align: center;
}

.subtitle {
    font-size: 1.6vh;
    color: #9ca3af;
    margin-bottom: 20px;
    text-align: center;
}

/* BOTONES */
button {
    width: 100%;
    margin: 6px 0;
    padding: clamp(10px, 1.8vh, 18px);
    font-size: clamp(14px, 1.6vh, 16px);
    border-radius: 10px;

    border: 1px solid rgba(255,215,0,0.3);
    background: rgba(255,215,0,0.05);
    color: #facc15;
    cursor: pointer;

    transition: all 0.2s ease;
}

button:hover {
    background: rgba(255,215,0,0.2);
    box-shadow: 0 0 12px rgba(255,215,0,0.5);
}

button:active {
    transform: scale(0.97);
}

/* INPUT */
input {
    width: 100%;
    padding: 14px;
    margin-top: 10px;

    border-radius: 8px;

    background: #020617;
    border: 1px solid #334155;
    color: white;
}

/* RESULT */
img {
    width: 100%;
    margin-top: 15px;
    border-radius: 10px;
    animation: fadeIn 1s ease;
}

.hidden { display: none; }
.error { color: #ef4444; }
.success { color: #22c55e; }

.success-text {
    color: #22c55e;
    text-shadow: 0 0 10px rgba(34,197,94,0.6);
}
    
/* LOGO */
.logo {
    width: 12vh;
    margin: 0 auto 20px auto;
    display: block;
    border-radius: 12px;

    animation: floatLogo 3s ease-in-out infinite, glowLogo 4s ease-in-out infinite;
}

/* BOTON FINAL */
.secret-btn {
    margin-top: 10px;
    background: transparent;
    border: 2px dashed rgba(255,215,0,0.3);
    font-size: 20px;
}

@keyframes floatLogo {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0px); }
}

@keyframes glowLogo {
    0% { filter: drop-shadow(0 0 10px rgba(255,215,0,0.2)); }
    50% { filter: drop-shadow(0 0 25px rgba(255,215,0,0.6)); }
    100% { filter: drop-shadow(0 0 10px rgba(255,215,0,0.2)); }
}

/* PANTALLA INICIAL */
#startScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #020617;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    z-index: 1000;
}
</style>
</head>

<body>

<div id="startScreen">
<h1 style="font-family:Cinzel; letter-spacing:3px;">INICIAR EXPERIENCIA</h1>
<button onclick="initExperience()">COMENZAR</button>
</div>

<canvas id="particles"></canvas>

<div class="container">

<div id="home" class="card">
    <img src="https://i.imgur.com/Z2tU22q.png" class="logo">
    <h1>BIENVENIDOS</h1>
    <p class="subtitle">Selecciona tu nombre</p>

    <button onclick="selectUser('javi')">JAVI</button>
    <button onclick="selectUser('maite')">MAITE</button>
    <button onclick="selectUser('aless')">ALESS</button>
    <button onclick="selectUser('jenni')">JENNI</button>
    <button onclick="selectUser('patri')">PATRI</button>
    <button onclick="selectUser('david')">DAVID</button>
    <button onclick="selectUser('alba')">ALBA</button>
    <button onclick="selectUser('ivan')">IVAN</button>
    <button class="secret-btn" onclick="openFinal()">?</button>
</div>

<div id="quiz" class="card hidden">
    <h1 id="titleUser"></h1>
    <p id="question"></p>

    <input type="text" id="answer" placeholder="Introduce la clave">

    <button onclick="checkAnswer()">COMPROBAR</button>
    <button onclick="goHome()">VOLVER</button>

    <p id="error" class="error"></p>
</div>

<div id="result" class="card hidden">
    <h1 class="success">ACCESO CONCEDIDO</h1>
    <img id="userImage">
    <button onclick="goHome()">VOLVER</button>
</div>

<div id="final" class="card hidden">
    <h1>CLAVE FINAL</h1>
    <p class="subtitle">Solo una letra y solo un orden forma una última clave</p>

    <input type="text" id="finalInput" placeholder="Introduce la clave">

    <button onclick="checkFinal()">VALIDAR</button>
    <button onclick="goHome()">VOLVER</button>

    <p id="finalError" class="error"></p>
    <p id="attemptsLeft"></p>
</div>

</div>

<!-- SONIDOS -->
<audio id="clickSound" src="audio/Click.mp3"></audio>
<audio id="successSound" src="audio/Success.mp3"></audio>
<audio id="ambient" src="audio/Intro.mp3" loop></audio>
<audio id="bloqueo" src="audio/Bloqueo.mp3"></audio>
<audio id="finalSound" src="audio/Final.mp3"></audio>
    
<script>

//Inicializacion del bloqueo
if(localStorage.getItem("attempts") === null){
    localStorage.setItem("attempts", 10);
}
    
//Bloqueo de la APP
if(parseInt(localStorage.getItem("attempts")) <= 0){
    lockApp();
}

document.getElementById("finalInput").addEventListener("input", () => {
    document.getElementById("finalError").innerText = "";
});
    
let audioCtx = null;

function unlockAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    if (audioCtx.state === "suspended") {
        audioCtx.resume();
    }
}
    
function initExperience(){

    // 🔑 desbloqueo REAL del audio
    unlockAudio();

    const ambient = document.getElementById("ambient");

    ambient.volume = 0.1;
    ambient.play().then(() => {

        let vol = 0;
        const fade = setInterval(()=>{
            if(vol < 0.5){
                vol += 0.05;
                ambient.volume = vol;
            } else {
                clearInterval(fade);
            }
        },200);

    }).catch(e => {
        console.log("Audio bloqueado:", e);
    });

    document.getElementById("startScreen").style.display = "none";
}
    
let currentUser = "";
let audioStarted = false;

const data = {
    javi:{question:"¿Qué abre todas las puertas?",answer:"llave",image:"img/invitacion_Javi.png"},
    aless:{question:"¿Cómo se accede a otro mundo?",answer:"portal",image:"URL_ALESS"},
    jenni:{question:"¿Qué sigue a la luz?",answer:"sombra",image:"URL_JENNI"},
    patri:{question:"¿Dónde comienza todo?",answer:"origen",image:"URL_PATRI"},
    david:{question:"¿Qué no se puede evitar?",answer:"destino",image:"URL_DAVID"},
    alba:{question:"¿Qué ilumina el camino?",answer:"luz",image:"URL_ALBA"},
    ivan:{question:"¿Qué estás a punto de empezar?",answer:"viaje",image:"URL_IVAN"},
    maite:{question:"¿Qué cruzas para entrar?",answer:"umbral",image:"URL_MAITE"}
};

function playSound(){
    unlockAudio();

    const s = document.getElementById("clickSound");
    s.pause();
    s.currentTime = 0;
    s.play().catch(()=>{});
}

function playSuccess(){
    unlockAudio();

    const s = document.getElementById("successSound");
    s.currentTime = 0;
    s.play().catch(()=>{});
}

function playBloqueo(){
    unlockAudio();

    const s = document.getElementById("bloqueo");
    s.currentTime = 0;
    s.play().catch(()=>{});
}

function playFinal(){
    unlockAudio();

    const s = document.getElementById("finalSound");
    s.currentTime = 0;
    s.play().catch(()=>{});
}
    
function selectUser(user){
    playSound();
    currentUser = user;

    document.getElementById("home").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    document.getElementById("final").classList.add("hidden");

    document.getElementById("titleUser").innerText = user.toUpperCase();
    document.getElementById("question").innerText = data[user].question;
    document.getElementById("error").innerText = "";
}

function checkAnswer(){
    playSound();
    let input = document.getElementById("answer").value.toLowerCase();

    if(input === data[currentUser].answer){
        playSuccess();
        vibrate([100, 50, 100]);

        // 🛑 parar música de fondo
        const ambient = document.getElementById("ambient");
        ambient.pause();
        ambient.currentTime = 0;
        
        document.getElementById("quiz").classList.add("hidden");
        document.getElementById("result").classList.remove("hidden");
        document.getElementById("userImage").src = data[currentUser].image;
    } else {
        document.getElementById("error").innerText = "Clave incorrecta";
        vibrate(200);
    }
}

function goHome(){
    playSound();
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("home").classList.remove("hidden");
    document.getElementById("answer").value="";
}

let attempts = parseInt(localStorage.getItem("attempts")) || 10;
const FINAL_KEY = "GUERRERO"; // Clave final real

function openFinal(){
    playSound();
    document.getElementById("home").classList.add("hidden");
    document.getElementById("final").classList.remove("hidden");
    updateAttempts();
}

function updateAttempts(){
    document.getElementById("attemptsLeft").innerText =
        "Intentos restantes: " + attempts;
}

//Mostrar intentos
updateAttempts();

function checkFinal(){

    if(attempts <= 0){
        lockApp();
        return;
    }

    const input = document.getElementById("finalInput").value.toUpperCase();
    
    if(input === FINAL_KEY){
        playFinal()
        vibrate([100, 50, 100]);
        
        const msg = document.getElementById("finalError");
        msg.innerText = "ACCESO DESBLOQUEADO";
        msg.classList.remove("error");
        msg.classList.add("success-text");
        
        setTimeout(()=>{
            window.open("https://chat.whatsapp.com/KDkzlur81e42CfIVYYgSuE", "_blank");
        }, 3000);

    } else {
        attempts--;
        localStorage.setItem("attempts", attempts);

        document.getElementById("finalError").innerText = "Incorrecto";
        vibrate(200);
        updateAttempts();

        if(attempts <= 0){
            lockApp();
        }
    }
}

function vibrate(pattern){
    if ("vibrate" in navigator) {
        navigator.vibrate(pattern);
    }
}

function lockApp(){
    playBloqueo();
    document.body.innerHTML = `
        <div style="
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#020617;
            color:white;
            text-align:center;
        ">
            <div>
                <h1>ACCESO BLOQUEADO</h1>
                <p>Has agotado los intentos, no te mereces acceder al evento</p>
            </div>
        </div>
    `;
}

/* PARTICULAS */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function initParticles(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    particles = [];

    for(let i=0;i<60;i++){
        particles.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height,
            r:Math.random()*2,
            d:Math.random()*0.5
        });
    }
}

let particles = [];

initParticles();

window.addEventListener('resize', () => {
    initParticles();
});

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="rgba(255,215,0,0.6)";

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();

        p.y += p.d;
        if(p.y > canvas.height) p.y = 0;
    });

    requestAnimationFrame(draw);
}

draw();
    
</script>

</body>
</html>
