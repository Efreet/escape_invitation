<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Inicio de la Aventura</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at center, #0f172a, #020617);
    color: #e5e7eb;
    overflow: hidden;
}

/* CONTENEDOR APP */
.container {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100vh;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    padding: 20px;
    box-sizing: border-box;

    animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
}

/* PARTICULAS */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
}

/* TARJETA */
.card {
    width: 100%;
    max-width: 380px;

    border: 1px solid rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 16px;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(8px);
}

/* TEXTOS */
h1 {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    text-align: center;
}

.subtitle {
    color: #9ca3af;
    margin-bottom: 20px;
    text-align: center;
}

/* BOTONES */
button {
    width: 100%;
    margin: 8px 0;
    padding: 16px;

    font-size: 16px;
    border-radius: 10px;

    border: 1px solid rgba(255,215,0,0.3);
    background: rgba(255,215,0,0.05);
    color: #facc15;
    cursor: pointer;

    transition: all 0.2s ease;
}

button:hover {
    background: rgba(255,215,0,0.2);
    box-shadow: 0 0 12px rgba(255,215,0,0.5);
}

button:active {
    transform: scale(0.97);
}

/* INPUT */
input {
    width: 100%;
    padding: 14px;
    margin-top: 10px;

    border-radius: 8px;

    background: #020617;
    border: 1px solid #334155;
    color: white;
}

/* RESULT */
img {
    width: 100%;
    margin-top: 15px;
    border-radius: 10px;
    animation: fadeIn 1s ease;
}

.hidden { display: none; }
.error { color: #ef4444; }
.success { color: #22c55e; }

/* LOGO */
.logo {
    width: 110px;
    margin: 0 auto 20px auto;
    display: block;
    border-radius: 12px;

    animation: floatLogo 3s ease-in-out infinite, glowLogo 4s ease-in-out infinite;
}

@keyframes floatLogo {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0px); }
}

@keyframes glowLogo {
    0% { filter: drop-shadow(0 0 10px rgba(255,215,0,0.2)); }
    50% { filter: drop-shadow(0 0 25px rgba(255,215,0,0.6)); }
    100% { filter: drop-shadow(0 0 10px rgba(255,215,0,0.2)); }
}

/* PANTALLA INICIAL */
#startScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #020617;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    z-index: 1000;
}
</style>
</head>

<body>

<div id="startScreen">
<h1 style="font-family:Cinzel; letter-spacing:3px;">INICIAR EXPERIENCIA</h1>
<button onclick="initExperience()">COMENZAR</button>
</div>

<canvas id="particles"></canvas>

<div class="container">

<div id="home" class="card">
    <img src="https://i.imgur.com/Z2tU22q.png" class="logo">
    <h1>BIENVENIDOS</h1>
    <p class="subtitle">Selecciona tu nombre</p>

    <button onclick="selectUser('javi')">JAVI</button>
    <button onclick="selectUser('maite')">MAITE</button>
    <button onclick="selectUser('aless')">ALESS</button>
    <button onclick="selectUser('jenni')">JENNI</button>
    <button onclick="selectUser('patri')">PATRI</button>
    <button onclick="selectUser('david')">DAVID</button>
    <button onclick="selectUser('alba')">ALBA</button>
    <button onclick="selectUser('ivan')">IVAN</button>
</div>

<div id="quiz" class="card hidden">
    <h1 id="titleUser"></h1>
    <p id="question"></p>

    <input type="text" id="answer" placeholder="Introduce la clave">

    <button onclick="checkAnswer()">COMPROBAR</button>
    <button onclick="goHome()">VOLVER</button>

    <p id="error" class="error"></p>
</div>

<div id="result" class="card hidden">
    <h1 class="success">ACCESO CONCEDIDO</h1>
    <img id="userImage">
    <button onclick="goHome()">VOLVER</button>
</div>

</div>

<!-- SONIDOS -->
<audio id="clickSound" src="audio/Click.mp3"></audio>
<audio id="successSound" src="audio/Success.mp3"></audio>
<audio id="ambient" src="audio/Intro.mp3" loop></audio>

<script>
/* TODO tu JS intacto (no lo he tocado) */
</script>

</body>
</html>
